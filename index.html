<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Adilet Shynggys — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#09101f;
--bg2:#0d1628;
--bg3:#111d35;
--gold:#c8963e;
--gold-lt:#e8b96a;
--gold-dim:rgba(200,150,62,.15);
--blue:#3a6aad;
--blue-lt:#5e9de8;
--text:#e8eaf0;
--text-dim:#8b96ad;
--border:rgba(200,150,62,.2);
--font-display:'Cormorant Garamond',serif;
--font-mono:'Space Mono',monospace;
--font-body:'DM Sans',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
font-family:var(--font-body)
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;left:0;height:100%;
width:220px;
background:var(--bg2);
border-right:1px solid var(--border);
padding:30px 0;
}

.nav-link{
display:block;
padding:12px 28px;
background:none;
border:none;
color:var(--text-dim);
cursor:pointer;
text-align:left;
}

.nav-link.active{color:var(--gold)}

/* MAIN */
.main{margin-left:220px;padding:40px}

.section{display:none}
.section.active{display:block}

/* CONTACT */
.form-input,.form-textarea{
width:100%;
margin-bottom:10px;
padding:10px;
background:var(--bg3);
border:1px solid var(--border);
color:var(--text);
}

.btn-send{
padding:12px;width:100%;
background:var(--gold);
border:none;cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
}
</style>
</head>

<body>

<button id="mobileToggle">☰</button>

<nav class="sidebar" id="sidebar">
<button class="nav-link active" data-target="home">About</button>
<button class="nav-link" data-target="projects">Projects</button>
<button class="nav-link" data-target="contact">Contact</button>
</nav>

<main class="main">

<section id="home" class="section active">
<h1>Adilet Shynggys</h1>
<p>Mechanical & Aerospace Engineering student.</p>
</section>

<section id="projects" class="section">
<h2>Projects</h2>
<p>TENG optimization, manufacturing improvements, etc.</p>
</section>

<section id="contact" class="section">
<h2>Contact</h2>

<form id="contactForm">
<input name="name" class="form-input" placeholder="Name" required>
<input name="email" type="email" class="form-input" placeholder="Email" required>
<textarea name="message" class="form-textarea" placeholder="Message" required></textarea>
<button type="submit" class="btn-send">Send Message</button>
</form>

</section>

</main>

<script>
const links=document.querySelectorAll('.nav-link');
const sections=document.querySelectorAll('.section');

function activateSection(id){
sections.forEach(s=>s.classList.remove('active'));
links.forEach(l=>l.classList.remove('active'));

document.getElementById(id).classList.add('active');
document.querySelector(`[data-target="${id}"]`).classList.add('active');
document.getElementById('sidebar').classList.remove('open');
}

function showSection(id){
location.hash=id;
}

links.forEach(link=>{
link.addEventListener('click',()=>showSection(link.dataset.target));
});

window.addEventListener('load',()=>{
const id=location.hash.replace('#','')||'home';
activateSection(id);
});

window.addEventListener('hashchange',()=>{
const id=location.hash.replace('#','');
activateSection(id);
});

document.getElementById('mobileToggle').onclick=()=>{
document.getElementById('sidebar').classList.toggle('open');
};

/* CONTACT FORM */
const form=document.getElementById('contactForm');

form.addEventListener('submit',async e=>{
e.preventDefault();

const btn=form.querySelector('button');
btn.textContent="Sending...";

const data=new FormData(form);

try{
await fetch("https://formspree.io/f/YOUR_FORM_ID",{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});
btn.textContent="✓ Sent!";
form.reset();
}catch{
btn.textContent="Error";
}

setTimeout(()=>btn.textContent="Send Message",3000);
});
</script>

</body>
</html>
